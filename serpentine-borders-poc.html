<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stacked Rectangles</title>
<style>
  body {
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    font-family: Georgia, serif;
  }
  .container {
    position: relative;
    width: 340px;
  }
  .box {
    width: 340px;
    background: #16213e;
    color: #e0e0e0;
    padding: 32px 28px;
    box-sizing: border-box;
  }
  .box-1 { height: 160px; }
  .box-2 { height: 140px; }
  .box-3 { height: 150px; }
  .box-4 { height: 130px; }
  .box h2 {
    margin: 0 0 8px;
    font-size: 1.1rem;
    color: #a8dadc;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .box p {
    margin: 0;
    font-size: 0.9rem;
    color: #8899aa;
    line-height: 1.6;
  }
  .border-svg {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    overflow: visible;
  }
</style>
</head>
<body>
<div class="container">
  <div class="box box-1">
    <h2>Panel One</h2>
    <p>Content lives inside this first panel.</p>
  </div>
  <div class="box box-2">
    <h2>Panel Two</h2>
    <p>This panel's top border flows naturally from the left side above.</p>
  </div>
  <div class="box box-3">
    <h2>Panel Three</h2>
    <p>The border snakes down the right side from above.</p>
  </div>
  <div class="box box-4">
    <h2>Panel Four</h2>
    <p>Final panel, completing the serpentine border.</p>
  </div>
  <svg class="border-svg" id="svg" overflow="visible">
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="1.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
  </svg>
</div>

<script>
  const W  = document.querySelector('.container').offsetWidth;
  const H1 = document.querySelector('.box-1').offsetHeight;
  const H2 = document.querySelector('.box-2').offsetHeight;
  const H3 = document.querySelector('.box-3').offsetHeight;
  const H4 = document.querySelector('.box-4').offsetHeight;
  const svg = document.getElementById('svg');

  const Y1 = H1, Y2 = H1+H2, Y3 = H1+H2+H3, Y4 = H1+H2+H3+H4;
  const N = 5, gap = 4, R = 22;
  const colors = ['#c8f4f6','#a8dadc','#88c9cb','#6ab8bb','#5aa0a8'];

  // Fixed-center corners (shrinking r=R-o): C1, C2, C4, C6  → parallel arcs
  // Local-center corners (constant R):      C3, C5, C7       → correct exits from horizontal runs
  //
  // C1: center(R,R),      from(R,o)      to(o,R),       sweep=1 (90° clockwise around corner)
  // C2: center(R,Y1-R),   from(o,Y1-R)   to(R,Y1-o),    sweep=1
  // C3: local,            from(W-o-R,Y1-o) to(W-o,Y1-o+R), sweep=1
  // C4: center(W-R,Y2-R), from(W-o,Y2-R) to(W-R,Y2-o),  sweep=1
  // C5: local,            from(o+R,Y2-o)  to(o,Y2-o+R),  sweep=0
  // C6: center(R,Y3-R),   from(o,Y3-R)   to(R,Y3-o),    sweep=1
  // C7: local,            from(W-o-R,Y3-o) to(W-o,Y3-o+R), sweep=1

  for (let i = 0; i < N; i++) {
    const o = i * gap;
    const r = R - o;
    if (r <= 0) break;

    const d = [
      `M ${W} ${o}`,
      `L ${R} ${o}`,
      `A ${r} ${r} 0 0 1 ${o} ${R}`,                // C1 fixed sweep=1
      `L ${o} ${Y1-R}`,
      `A ${r} ${r} 0 0 1 ${R} ${Y1-o}`,              // C2 fixed sweep=1
      `L ${W-o-R} ${Y1-o}`,
      `A ${R} ${R} 0 0 1 ${W-o} ${Y1-o+R}`,          // C3 local sweep=1
      `L ${W-o} ${Y2-R}`,
      `A ${r} ${r} 0 0 1 ${W-R} ${Y2-o}`,            // C4 fixed sweep=1
      `L ${o+R} ${Y2-o}`,
      `A ${R} ${R} 0 0 0 ${o} ${Y2-o+R}`,            // C5 local sweep=0
      `L ${o} ${Y3-R}`,
      `A ${r} ${r} 0 0 1 ${R} ${Y3-o}`,              // C6 fixed sweep=1
      `L ${W-o-R} ${Y3-o}`,
      `A ${R} ${R} 0 0 1 ${W-o} ${Y3-o+R}`,          // C7 local sweep=1
      `L ${W-o} ${Y4}`,
    ].join(' ');

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', colors[i]);
    path.setAttribute('stroke-width', '1.4');
    path.setAttribute('opacity', String(1 - i * 0.06));
    path.setAttribute('filter', 'url(#glow)');
    svg.appendChild(path);
  }
</script>
</body>
</html>
