# Requires GitHub repository Variables (Settings → Secrets and variables → Actions → Variables):
#   AWS_ACCOUNT_ID
#   AWS_S3_SYNC_ROLE_NAME   — IAM role name trusted for GitHub OIDC (must allow s3 sync + invalidation)
#   AWS_REGION
#   S3_BUCKET_NAME
#   CLOUDFRONT_DISTRIBUTION_ID
#
# Optional: configure a GitHub Environment named "prod" for approval gates.

name: Deploy to S3 on vX.X.X Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_S3_SYNC_ROLE_NAME: ${{ vars.AWS_S3_SYNC_ROLE_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.AWS_S3_SYNC_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync files to S3
        run: aws s3 sync ./dist "s3://${{ env.S3_BUCKET_NAME }}" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
